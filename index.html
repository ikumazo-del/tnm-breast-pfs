// 【v2.1.8】analysis を追加。「誰の値か」だけでなく「その値がどういう資格で出た値か」も落とさない（第5の偽装の禁止）。
function evText(key, mode) {
  const e = ADV_EVIDENCE[key];
  if (!e) return "";
  // 【v2.1.12】安全性エントリ（kind:"safety"）は「効果の参考値」テンプレートに載せない（＝同意説明の必須情報であり、
  //   効能・効果ごとの効果値ではない）。value=厳しい版（方向性）／short=簡略・重要点版（スケジュール）。
  //   evText(key,"short") で short を返す。★この分岐を消すと、ILDが「○○試験：」の効果値の顔で出てしまう。
  if (e.kind === "safety") return (mode === "short" && e.short) ? e.short : e.value;
  const warn = e.type === "est" ? "\n※ この数値は一次資料未確認です（担当医にご確認ください）" : "";
  return `【参考値】${e.trial}試験：${e.value}\n▸ この値の対象：${e.population}\n▸ この値の位置づけ：${e.analysis}${warn}`;
}
function getAnatomical(t, n, m) {
  if (!t || !n || !m) return null;
  if (m === "M1") return "IV";
  if (t === "Tis") return n === "N0" ? "0" : "invalid";
  if (n === "N3") return "IIIC";
  if (t === "T4") return "IIIB";
  if (n === "N2") return "IIIA";
  if (t === "T3" && (n === "N1" || n === "N1mi")) return "IIIA";
  if (t === "T3" && n === "N0") return "IIB";
  if (t === "T2" && n === "N1") return "IIB";
  if (t === "T2" && (n === "N0" || n === "N1mi")) return "IIA";
  if ((t === "T0" || t === "T1") && n === "N1") return "IIA";
  if ((t === "T0" || t === "T1") && n === "N1mi") return "IB";
  if (t === "T1" && n === "N0") return "IA";
  if (t === "T0" && n === "N0") return "invalid";
  return "invalid";
}

function getPrognostic(anat, er, pr, her2, grade) {
  if (!anat || anat === "invalid") return null;
  if (anat === "0" || anat === "IV") return anat;
  if (!er || !her2 || !grade) return null;
  const hr = er === "+" || pr === "+";
  const a = anat;
  if (her2 === "+") {
    return { IA:"IA",IB:"IA",IIA:"IIA",IIB:"IIB",IIIA:"IIIA",IIIB:"IIIB",IIIC:"IIIC" }[a] ?? a;
  }
  if (hr) {
    const tbl = {
      "1":{ IA:"IA",IB:"IA",IIA:"IA",IIB:"IB",IIIA:"IIA",IIIB:"IIIA",IIIC:"IIIB" },
      "2":{ IA:"IA",IB:"IA",IIA:"IB",IIB:"IIA",IIIA:"IIB",IIIB:"IIIA",IIIC:"IIIB" },
      "3":{ IA:"IB",IB:"IIA",IIA:"IIA",IIB:"IIB",IIIA:"IIIA",IIIB:"IIIB",IIIC:"IIIC" },
    };
    return tbl[grade]?.[a] ?? a;
  }
  return { IA:"IB",IB:"IIA",IIA:"IIA",IIB:"IIIA",IIIA:"IIIA",IIIB:"IIIB",IIIC:"IIIC" }[a] ?? a;
}

function getSubtype(er, pr, her2) {
  if (!er || !her2) return null;
  const hr = er === "+" || pr === "+";
  if (her2 === "+") return hr ? "HR+/HER2+" : "HER2+";
  return hr ? "HR+/HER2-" : "TNBC";
}

function isNPlus(n) { return n === "N1" || n === "N2" || n === "N3"; }
// 【v2.1.15】単一ソース化：nCount（N1の1-3/4+セグメント）を廃止。
//   陽性個数≥4 は nFromCount で N2(4–9)/N3(≥10) へ自動昇格するため、
//   「N1かつ4個以上」は構造的に生成不能＝旧 (N1 && "4+") 分岐は死にコード化。
//   よって isN4plus は「pN個数≥4＝N2/N3」と等価（IwaoK決裁 2026-07-17・③）。
//   N1ボタン＝1–3個 と定義が確定するので isN1to3 は N1mi/N1 で足りる。
function isN4plus(n) {
  return n === "N2" || n === "N3";
}
function isN1to3(n) {
  return n === "N1mi" || n === "N1";
}
function isAbemaciclib(n, t, grade, ki67) {
  if (isN4plus(n)) return true;   // ≥4個（N2/N3）
  // 1–3個（N1/N1mi）＋高リスク特徴が1つ以上：Grade3 / pT3以上(≥5cm相当) / Ki-67≥20%（monarchE cohort2）
  const ki67v = Number(ki67);
  if (isN1to3(n) && (grade === "3" || t === "T3" || t === "T4" || (Number.isFinite(ki67v) && ki67v >= 20))) return true;
  return false;
}
// 【v2.1.16】OncotypeDx適応：HR+/HER2−の保険適用範囲（N0/N1mi/N1）内で、
//   リスク特徴（N1＝1–3個の節転移 / 核Grade2-3 / Ki-67≥20%）のいずれかがあるとき作動。
//   ★N2/N3（腋窩4個以上）は日本の保険適用外＝背骨(保険準拠)に従い除外（IwaoK決裁 2026-07-17）。
//   ★Ki-67閾値は ≥20%（monarchE・ki67High表示と統一・IwaoK決裁 2026-07-17 3便目）。
function isOncotypeDxEligible(subtype, n, grade, ki67) {
  if (subtype !== "HR+/HER2-") return false;
  if (n === "N2" || n === "N3") return false;   // 腋窩4個以上＝保険適用外
  const ki67v = Number(ki67);
  return n === "N1" || grade === "2" || grade === "3" || (Number.isFinite(ki67v) && ki67v >= 20);
}

// 出典: JOHBOC 遺伝性乳癌卵巣癌GL 2024 乳癌CQ8 / Tutt NEJM2021 / Geyer AnnOncol2022。
// 大前提: gBRCA1/2病的バリアント陽性（アプリにBRCA入力軸なし→表示は常に「gBRCA+例」条件付き）。HER2陰性のみ。
// 化学療法の時期(術前=non-pCR前提／術後=手術先行)×サブタイプで再発高リスク定義が異なる。
// 返り値: null(非該当) | { ctx:"術前"|"術後", cond:"表示用の再発高リスク条件文" }
function olaparibEligibility(subtype, primaryTx, t, n) {
  if (subtype !== "TNBC" && subtype !== "HR+/HER2-") return null;   // OlympiAはHER2陰性のみ
  const isNeoAdj = primaryTx === "術前化学療法" || primaryTx === "術前化学内分泌療法";
  if (isNeoAdj) {
    // 術前化学療法後 = non-pCR前提（pCR達成例は非適応）
    return subtype === "TNBC"
      ? { ctx:"術前", cond:"non-pCR（乳房/腋窩に浸潤癌残存）" }
      : { ctx:"術前", cond:"non-pCR かつ CPS+EGスコア≥3" };   // HR+/HER2-
  }

  if (subtype === "TNBC")
    return (["T2","T3","T4"].includes(t) || isNPlus(n)) ? { ctx:"術後", cond:"pT2以上 または pN1以上" } : null;
  // HR+/HER2-: 腋窩リンパ節転移4個以上
  return isN4plus(n) ? { ctx:"術後", cond:"腋窩リンパ節転移4個以上" } : null;
}

        "転移した部分の生検（可能な場合）：もとの乳がんとホルモン受容体・HER2の結果が変わっていることがあります"
      ]},
      // 【v2.1.9・§3-B-2】PD-L1陰性の枝を追加。方向性側に陽性枝しかなく（スケジュール側にはあった＝層間非対称）、
      //   PD-L1陰性の方が「キイトルーダ」の行だけを読んで自分の薬と誤読し得た。＝§0の中核原則（非適応薬を前に出さない）の違反。
      { cat:"1次治療：化学療法 ± 免疫療法", items:[

        "── PD-L1陰性（CPS 10未満）の場合 ──\n化学療法（タキサン系・アントラサイクリン系 等）\n※ ペムブロリズマブ（キイトルーダ）は併用しません"
      ]},
      // 【v2.1.9・§3-A-2（IwaoK決裁：TNBCのPARP＝「化学療法の代わり（耐性後）」）】
      //   PARP阻害薬を「1次治療」カテゴリから「2次治療以降」へ移設した。理由は3つ：
      //   ① 日本の保険承認要件が「がん化学療法歴のある」HER2陰性・gBRCA変異陽性例 ＝ 1次治療の薬ではない（本アプリは日本の承認に準拠する）。
      //      旧記載は「1次治療」カテゴリの中に「化学療法歴のある方が対象」と書いており、カテゴリ名と本文が矛盾していた（v13則違反）。

      { cat:"2次治療以降：抗体薬物複合体 ／ 化学療法（± PARP阻害薬）", items:[

        // 【★v2.1.12・§3-A-1（IwaoK決裁 2026-07-15：案B）】TNBC枝にもT-DXdを配線。ただし配置と書き方を薬事の実態に厳密化する。

        //     → ★HER2超低発現のTNBCは一切書かない（IwaoK 2026-07-15：「勘違いしていた、全く記載してはいけない」）。書けばDB-06をHR陰性へ外挿する集団偽装。
        //   ★案B（IwaoK決裁）：見栄えの良いHR（HR−コホート63例＝PFS HR0.46／OS HR0.48）は出さない。
        //     この63例は階層的検定の外＝P値なし。効果を主張しなければ数値がなくても偽装は生じない（v17則）。0.46を出すと「TNBCで効果が証明された」と誤読される。
        //     → 承認の事実＋試験名＋「63例・検定外」の限界だけを言葉で書く。新しい数値エントリ（DB04_TNBC_*）は作らない。
        "── HER2低発現の場合（要 HER2の染まり方の確認）──\nトラスツズマブ デルクステカン（エンハーツ）：HER2を目印にする点滴のお薬（抗体薬物複合体）です。トリプルネガティブ（ホルモン受容体もHER2も陰性）と判定された方でも、HER2の染まり方をあらためて読み直すと「HER2低発現」に当たることがあり、その場合は日本での承認（「化学療法歴のあるHER2低発現の手術不能又は再発乳がん」＝ホルモン受容体を問いません）にもとづいて選択肢になります。\n※すでに化学療法を受けたことがある方が対象です（3週間ごとの点滴）。\n▸ この承認の根拠は DESTINY-Breast04 試験です。ただし、この試験でホルモン受容体が陰性だった方（トリプルネガティブ）は63人と少なく、統計のうえで「効果あり」を確定させる検定の対象には入っていません。「使えるお薬」ではありますが、「トリプルネガティブの方で効果が証明された」とまでは言えない段階です。ほかの選択肢と並べて担当医とご相談ください。\n※ HER2超低発現（さらに弱い染まり方）の方は、トリプルネガティブでは承認の対象になりません（超低発現でエンハーツが使えるのは、ホルモン受容体が陽性の方だけです）。",

        "その他の単剤化学療法：エリブリン（ハラヴェン）、カペシタビン、ゲムシタビン 等",

  const res = [];
  const localItems = ["手術（腫瘍径・病期に応じて温存または全摘 ± 再建）"];
  if (surgery === "温存") {
    localItems.push("放射線療法（温存後：残存乳房照射 16〜20回）");

        : grade === "3" ? "N1-3個＋Grade3"
        : (t === "T3" || t === "T4") ? "N1-3個＋腫瘍径≥5cm"
        : "N1-3個＋Ki-67≥20%";
      etItems.push(`アベマシクリブ（ベージニオ）＋ 内分泌療法 2年：再発高リスク（${why}、monarchE基準）`);
    }
    // 【v2.0.8方針変更】非適応(N1-3・Grade1/2・T2以下)では薬剤名を出さない＝説明書原案での誤解回避。
    // 以前は下記の教育的注意書きを表示していた（痕跡として残置）：
    // else if (nPos && isN1to3(n)) {
    //   etItems.push("アベマシクリブ（ベージニオ）：N1-3個では Grade3 または 腫瘍径≥5cm の場合に適応（monarchE基準を確認）");
    // }

    const olaEligHR = olaparibEligibility(subtype, primaryTx, t, n);
    if (olaEligHR) etItems.push(`オラパリブ（リムパーザ）1年：gBRCA1/2変異陽性・${olaEligHR.cond}の例（OlympiA試験）※ BRCA検査が必要${abema ? "／アベマシクリブとは併用不可・どちらか一方を選択" : ""}`);
    res.push({ cat:"内分泌療法 ＋ 補助薬物療法", items:etItems });

    const isNeoAdjSelected = primaryTx === "術前化学療法" || primaryTx === "術前化学内分泌療法";
    if (isOncotypeDxEligible(subtype, n, grade, ki67) && !isNeoAdjSelected) {

        ? "Oncotype DX 高リスク（RS≥26）→ 化学療法を推奨"
        : oncotype === "中リスク"

        : "Oncotype DX 検査：腫瘍の遺伝子を調べて再発リスクと化学療法の効果を予測（N0〜N1(1-3個)/HR+/HER2-で保険適用）";
      res.push({ cat:"Oncotype DX（ゲノム検査）", items:[odxMsg] });
    }
    if (["T2","T3","T4"].includes(t)) {
      res.push({ cat:"術前化学療法（ネオアジュバント）の候補", items:["HR+/HER2-のT2以上では術前化学療法を選択することがあります","EC療法（エピルビシン＋シクロホスファミド）→ パクリタキセルが基本レジメン","※「初回治療方針」で「術前化学療法（HR+/HER2-）」を選択すると治療スケジュールが表示されます"]});
    }
    // 【v2.0.8】Ki-67(増殖能)を治療判断に反映（従来はデッドパラメータだった）
    if (ki67High) {
      res.push({ cat:"増殖能（Ki-67）", items:[`Ki-67高値（${ki67v}%／当施設基準 ≥${KI67_HIGH}%）：Luminal B様。化学療法の上乗せを考慮`] });

      res.push({ cat:"増殖能（Ki-67）", items:[`Ki-67低値（${ki67v}%／当施設基準 ≤${KI67_LOW}%）：Luminal A様。内分泌療法主体（化学療法省略を考慮）`] });

    if (isHighRisk || oncotype === "高リスク" || ki67High) {
      res.push({ cat:"化学療法（術後・高リスク例）", items:["AC→T（アンスラサイクリン→タキサン）、TC 等"] });

  if (subtype === "HER2+" || subtype === "HR+/HER2+") {
    if (isHighRisk)

    else

    if (subtype === "HR+/HER2+") {
      const etDetail = postMeno
        ? "アロマターゼ阻害薬（レトロゾール、アナストロゾール、エキセメスタン）5〜10年"
        : preMeno
        ? "タモキシフェン 5〜10年（閉経前標準）／高リスク例：卵巣機能抑制（LH-RHアゴニスト）＋タモキシフェン または AI（SOFT/TEXT）"
        : "タモキシフェン または アロマターゼ阻害薬（閉経状況により選択）";
      res.push({ cat:"内分泌療法（ER/PR陽性例に追加）", items:[etDetail, "※抗HER2療法（トラスツズマブ ± ペルツズマブ／T-DM1）と並行して実施します"] });
    }
  }

  if (subtype === "TNBC") {
    const items = ["術前：ペムブロリズマブ（キイトルーダ）＋ アンスラサイクリン＋タキサン（KEYNOTE-522）","術後：ペムブロリズマブ継続（1年）","術前でpCR未達の場合 → カペシタビン追加を考慮"];
    // 【v2.1.3】オラパリブ: OlympiA(JOHBOC CQ8)適応に厳密化。TNBC術後=pT2以上orpN1以上／術前=non-pCR。カペシタビンとは併用不可（択一）。
    const olaEligTN = olaparibEligibility(subtype, primaryTx, t, n);
    if (olaEligTN) items.push(`オラパリブ（リムパーザ）1年：gBRCA1/2変異陽性・${olaEligTN.cond}の例（OlympiA試験）※ BRCA検査が必要／カペシタビンとは併用不可・どちらか一方を選択`);
    res.push({ cat:"化学療法 ＋ 免疫療法", items });
  }

  return res;
}

// ── Treatment Schedule ────────────────────────────────────────────────
function buildSchedule(primaryTx, subtype, surgery, lymphNode, menopause, anat, n, t, grade, ki67) {
  const isNeoAdj   = primaryTx === "術前化学療法";
  const isNeoAdjHR = primaryTx === "術前化学内分泌療法";
  const isHER2     = subtype === "HER2+" || subtype === "HR+/HER2+";
  const isHR       = subtype === "HR+/HER2-" || subtype === "HR+/HER2+";
  const isTNBC     = subtype === "TNBC";
  const isLuminal  = subtype === "HR+/HER2-" || subtype === "HR+/HER2+";
  const hasSLNB    = lymphNode === "センチネル生検" || lymphNode === "両方";

  const postMeno   = menopause === "閉経後";
  const preMeno    = menopause === "閉経前";

  //  ・M1で術式(温存/全摘)を選ぶと「手術先行＝術後補助療法」枝に落ちる
  //  ・M1で術前化学療法を選ぶと「術前化学療法（手術前提）」枝に落ちる
  //  という層間矛盾（getTreatmentは anat==="IV" で緩和的1次治療を返す）が起きていた。
  //  isPalliative を新設し、if連鎖の最上流（DCISの次）で判定する。M0の非手術（高齢・寝たきり・皮膚浸潤等）も同枝でOK（IwaoK判断）。
  const isAdv        = anat === "IV";

  const etAdjContent =
    postMeno ? "アロマターゼ阻害薬（レトロゾール等）5〜10年"

    : "閉経状況により選択：閉経後=AI／閉経前=タモキシフェン±卵巣機能抑制(OFS)";

  const abemaAdd = (subtype === "HR+/HER2-" && isAbemaciclib(n, t, grade, ki67))
    ? "\n高リスク：アベマシクリブ2年追加（monarchE基準）"
    : "";

  const s1Add = (subtype === "HR+/HER2-" && isNPlus(n))
    ? "\n中〜高リスク（N1以上）：TS-1（テガフール・ギメラシル・オテラシルカリウム）1年 追加を考慮（POTENT試験）"

    ? `\ngBRCA1/2変異陽性・${olaElig.cond}：オラパリブ（リムパーザ）1年も選択肢（OlympiA試験・${olaAltPartner}とは併用不可／要BRCA検査）`

  const rows = [];

  // ── DCIS(0)非浸潤がん分岐: 手術＋（温存なら放射線）＋（Luminalなら内分泌）のみ。術後化学・抗HER2は出さない ──
  if (anat === "0") {

    rows.push({ phase:"内分泌療法", period:"術後〜5年", content:(preMeno ? "タモキシフェン（DCISの再発リスク低減）※閉経前はタモキシフェン。DCISではOFS+AIは行いません" : postMeno ? "アロマターゼ阻害薬 または タモキシフェン（DCISの再発リスク低減）" : "タモキシフェン または アロマターゼ阻害薬（閉経状況により選択）"), color:"#f3e8fb" });

  if (isPalliative) {

      rows.push({ phase:"1次治療", period:"診断後〜", content:"内分泌療法 ＋ CDK4/6阻害薬（推奨）\n・AI（レトロゾール等）または タモキシフェン＋卵巣機能抑制\n・＋アベマシクリブ（ベージニオ）またはパルボシクリブ（イブランス）\n根拠：MONARCH 3／PALOMA-2\n※数値・閉経前の外挿の注記は「治療の方向性（参考）」をご覧ください", color:"#e8f0fb" });

      // 【★v2.1.11・§3-B-4】getTreatment側（化学療法カテゴリ）と対称に配線。片肺を作らない。
      //   DB-06（化学療法歴なし）とDB-04（化学療法歴あり）は別の効能・効果＝別の行として書く。混ぜない。
      rows.push({ phase:"化学療法（耐性後）", period:"2次治療後 進行時", content:"HER2低発現・HER2超低発現：トラスツズマブ デルクステカン（エンハーツ）＝3週間ごとの点滴\n・内分泌療法後・化学療法歴なし（根拠：DESTINY-Breast06）\n・化学療法歴あり（根拠：DESTINY-Breast04）\n単剤化学療法：パクリタキセル、エリブリン（ハラヴェン）等\nダトポタマブ デルクステカン（ダトロウェイ）\ngBRCA1/2変異陽性例：オラパリブ（リムパーザ）／タラゾパリブ（ターゼナ）＝内服単剤（根拠：OlympiAD）\n" + evText("DB_ILD_LOW","short") + "\n※各薬剤の数値・対象集団・HER2超低発現の注意（効果は確定していません）は「治療の方向性（参考）」をご覧ください", color:"#f0e8fb" });
    } else if (subtype === "HER2+" || subtype === "HR+/HER2+") {
      rows.push({ phase:"1次治療", period:"診断後〜", content:"トラスツズマブ（ハーセプチン）＋ ペルツズマブ（パージェタ）＋ タキサン系\n根拠：CLEOPATRA", color:"#e8f0fb" });
      rows.push({ phase:"2次治療", period:"1次治療後 進行時", content:"トラスツズマブ デルクステカン（エンハーツ）：T-DXd\n根拠：DESTINY-Breast03\n" + evText("DB_ILD_HER2POS","short"), color:"#ddeeff" });
      // 【v2.1.7・§3-B】数値なしの主張「脳転移例にも有効」を撤去し、一次確認済の値＋集団ラベルに置換。getTreatment側と対称に配線。
      // 【★v2.1.11・§3-B-1/B-2】getTreatment側と対称に配線（「3次治療は臨床的配置」注記・14日処方制限）。

    } else {
      rows.push({ phase:"1次治療", period:"診断後〜", content:"化学療法 ± 免疫療法\n・ペムブロリズマブ（キイトルーダ）＋ ナブパクリタキセル等（PD-L1陽性 CPS≥10）\n・PD-L1陰性例：アントラサイクリン系・タキサン系\n【根拠】KEYNOTE-355試験", color:"#e8f0fb" });
      // 【v2.1.7・§3-A】getTreatment側（2次治療以降カテゴリ）と対称に配線。HER2+/HR+は両層に値があるのにTNBCだけ片肺だった層間非対称を解消。

      // 【★v2.1.12・§3-A-1（案B）】TNBC枝にもT-DXdを配線（HER2低発現＋化学療法歴のみ・DB-04＝HR非依存）。スケジュールは薬剤名＋試験名のみ（IwaoK：A-1）。★HER2超低発現は書かない（TNBCは承認外）。63例検定外の限界・数値は方向性（参考）に集約。
      rows.push({ phase:"2次治療以降", period:"1次治療後 進行時", content:"サシツズマブ ゴビテカン（トロデルビ）：抗TROP-2 ADC（2024年9月 日本承認）\n根拠：ASCENT\nHER2低発現＋化学療法歴あり：トラスツズマブ デルクステカン（エンハーツ）＝3週間ごとの点滴\n根拠：DESTINY-Breast04（HR陰性コホートは63例・検定外＝方向性参照）\nその他：エリブリン（ハラヴェン）、カペシタビン等\ngBRCA1/2変異陽性例：オラパリブ（リムパーザ）／タラゾパリブ（ターゼナ）＝内服単剤（根拠：OlympiAD）\n" + evText("DB_ILD_LOW","short") + "\n※各薬剤の数値・対象集団は「治療の方向性（参考）」をご覧ください", color:"#ddeeff" });

    rows.push({ phase:"症状緩和ケア", period:"治療中〜継続", content:"疼痛（オピオイド等）・倦怠感・浮腫・皮膚の症状などのコントロール\n緩和ケアチームと連携", color:"#f0f8f0" });

  }

  if (isNeoAdjHR) {
    rows.push({ phase:"術前化学療法", period:"第1〜12週（EC療法）", content:"EC療法（エピルビシン＋シクロホスファミド）\n3週毎4サイクル", color:"#e8f0fb" });
    rows.push({ phase:"術前化学療法", period:"第13〜24週（タキサン）", content:"パクリタキセル（3週毎4サイクル）", color:"#e8f0fb" });
    rows.push({ phase:"術前内分泌療法（追加時）", period:"化学療法終了後 2〜4か月", content:(postMeno ? "アロマターゼ阻害薬（レトロゾール等）" : "LH-RHアゴニスト＋タモキシフェン等") + "\n※化学療法単独で手術の場合もあり", color:"#f3e8fb" });

      rows.push({ phase:"術前化学療法", period:"第13〜24週", content:"EC療法（エピルビシン＋シクロホスファミド）\n※抗HER2療法は休止", color:"#e8f0fb" });
    } else if (isTNBC) {
      rows.push({ phase:"術前化学療法", period:"第1〜12週", content:"パクリタキセル（3週毎）\n＋ペムブロリズマブ（キイトルーダ）", color:"#e8f0fb" });
      rows.push({ phase:"術前化学療法", period:"第13〜24週", content:"EC療法（エピルビシン＋シクロホスファミド）\n＋ペムブロリズマブ", color:"#e8f0fb" });
    } else {
      rows.push({ phase:"術前化学療法", period:"第1〜24週", content:"担当医と相談の上、最適なレジメンを決定", color:"#e8f0fb" });
    }
    rows.push({ phase:"手術", period:"化学療法終了後 約4〜6週", content:`${surgery ?? "乳房手術"}${hasSLNB ? "\n＋センチネルリンパ節生検" : ""}${lymphNode === "腋窩郭清" || lymphNode === "両方" ? "\n＋腋窩リンパ節郭清（適応時）" : ""}`, color:"#fef3e2" });
    if (isHER2) {
      rows.push({ phase:"術後療法", period:"術後（pCR達成）", content:"トラスツズマブ継続（合計1年完了まで）", color:"#e8f7ee" });

    } else if (isTNBC) {
      rows.push({ phase:"術後療法", period:"術後（pCR達成）", content:"ペムブロリズマブ継続（術前分と合計1年）", color:"#e8f7ee" });
      rows.push({ phase:"術後療法", period:"術後（pCR未達成）", content:"カペシタビン（8サイクル）\n＋ペムブロリズマブ継続" + olaAdd, color:"#fdeaea" });
    }
    if (isHR) rows.push({ phase:"内分泌療法", period:"術後〜5〜10年", content:etAdjContent + abemaAdd + s1Add + olaAdd, color:"#f3e8fb" });
    if (isBreastCon) rows.push({ phase:"放射線療法", period:"術後（適応時）", content:"温存術後：全乳房照射", color:"#fff8e1" });
  } else {
    rows.push({ phase:"手術", period:"初回", content:`${surgery ?? "乳房手術"}${hasSLNB ? "\n＋センチネルリンパ節生検" : ""}${lymphNode === "腋窩郭清" || lymphNode === "両方" ? "\n＋腋窩リンパ節郭清（適応時）" : ""}`, color:"#fef3e2" });
    if (subtype !== "HR+/HER2-") {
      rows.push({ phase:"術後化学療法", period:"術後4〜6週〜 約半年", content: isHER2 ? "EC療法→パクリタキセル＋トラスツズマブ（＋ペルツズマブ）\nトラスツズマブ合計1年" : isTNBC ? "EC療法→パクリタキセル\npCR未達相当時：カペシタビン追加" + olaAdd : "EC療法→パクリタキセル（適応例）", color:"#e8f0fb" });
    } else {
      rows.push({ phase:"術後化学療法", period:"術後（適応時）", content:"Ki-67・Oncotype DXスコア等により判断\n高リスク：EC→パクリタキセル", color:"#e8f0fb" });
    }
    if (isHER2) rows.push({ phase:"術後抗HER2療法", period:"合計1年", content:"トラスツズマブ（＋ペルツズマブ）", color:"#e8f7ee" });
    if (isHR) rows.push({ phase:"内分泌療法", period:"〜5〜10年", content:etAdjContent + abemaAdd + s1Add + olaAdd, color:"#f3e8fb" });
    if (isBreastCon) rows.push({ phase:"放射線療法", period:"術後（適応時）", content:"温存術後：全乳房照射", color:"#fff8e1" });
  }

  if (!isPalliative) {
    rows.push({ phase:"定期フォロー", period:"治療中〜以降", content:"定期診察・血液検査・画像検査\n副作用・再発の早期発見", color:"#f5f5f5" });
  }
  return rows;
}

// ── 5年PFSパネル ──────────────────────────────────────────────────────
function PfsPanel({ anat, subtype, menopause, primaryTx, surgery, n, t, grade, ki67 }) {
  const [expanded, setExpanded] = useState(true);
  if (!anat || !subtype || anat === "invalid" || anat === "IV" || anat === "0") return null;
  // 閉経状態フラグ（Unit 2で閉経前HR+レジメンの出し分けに使用）
  const preMeno  = menopause === "閉経前";
  const postMeno = menopause === "閉経後";
  const menoUnset = !menopause;               // 7: 未選択時は閉経後に準拠
  // 閉経前 HR+/HER2- は専用データ（OFS基盤）に丸ごと差し替え。該当なければ通常データ。
  const usePremeno = preMeno && subtype === "HR+/HER2-" && !!PFS_DATA_PREMENO[subtype]?.[anat];
  const rawData = usePremeno ? PFS_DATA_PREMENO[subtype][anat] : PFS_DATA[subtype]?.[anat];
  if (!rawData || rawData.length === 0) return null;

  // ── 根っこ①: primaryTx/surgery/N を反映した表示制御 ──
  const nPos = isNPlus(n);                                          // N1/N2/N3
  const isSurgeryFirst = primaryTx === "手術";                       // 手術先行
  const isIII = ["IIIA","IIIB","IIIC"].includes(anat);             // Swain分岐対象病期

  // N条件フィルタ: req.nPlus の行（S-1等）はN+のときのみ表示（N0/低リスクで非表示）
  const data = rawData.filter(item => !(item.req?.nPlus && !nPos));
  // 【v2.1.3】オラパリブ(OlympiA/JOHBOC CQ8)iDFS行を適応成立時に動的注入（判断B: 適応を厳密化）。
  //  TNBC術後=pT2+/pN1+、HR+術後=腋窩4個以上、術前=non-pCR前提。値はサブグループ別4年iDFS(Fig2B)。
  const olaElig = olaparibEligibility(subtype, primaryTx, t, n);
  const dataWithOla = (olaElig && OLAPARIB_PFS[subtype]) ? [...data, ...OLAPARIB_PFS[subtype]] : data;
  if (dataWithOla.length === 0) return null;

  // 別枠タグ行（②単剤トラスツズマブ等）を主系列と分離
  const mainRows = dataWithOla.filter(it => it.tag !== "別枠");
  const altRows  = dataWithOla.filter(it => it.tag === "別枠");

  // 【v2.1.18】カタログ思想：症例に適応しない行も"値は残し"、目立つ「本症例は適応外」注釈を出す。
  //   行を隠すのではなく〈誰の値か〉を明示して誤読を防ぐ＝背骨の集団偽装対策と同じ精神。
  //   ※現状の対象はアベマ行のみ（PFSパネルでゲート無し＝常時表示のため）。S-1はreq.nPlusで非表示・olaparibは適応時のみ注入。
  const rowNotIndicated = (item) => {
    if (subtype === "HR+/HER2-" && item.label.includes("アベマシクリブ") && !isAbemaciclib(n, t, grade, ki67)) {
      return "本症例は適応外：monarchE基準（腋窩1–3個＋Grade3／pT3以上／Ki-67≥20%、または腋窩4個以上）を満たしません";
    }
    return null;
  };

  const maxPfs = 100;

  const pfsColor = (v) => {
    if (v >= 88) return { bar:"linear-gradient(90deg,#1a7a4a,#2aaa5a)", txt:"#1a6a3a" };
    if (v >= 75) return { bar:"linear-gradient(90deg,#3060aa,#4a80cc)", txt:"#2a508a" };
    if (v >= 60) return { bar:"linear-gradient(90deg,#8a5500,#bb8800)", txt:"#7a4a00" };
    return { bar:"linear-gradient(90deg,#992200,#cc3300)", txt:"#882200" };
  };

  // 1行ぶんのバー描画（主系列・別枠で共用）
  const renderBar = (item, i, isAlt) => {
    const { bar: barGrad, txt: txtCol } = pfsColor(item.pfs);
    const barW = `${item.pfs}%`;
    const notIndicated = rowNotIndicated(item);   // 本症例で適応外なら理由文字列
    // pCR枝の術前後レジメン分岐（Swain 2022, 4y EFS）: III期pCR=90(PH→H既定)にH→H/PH→PH内訳を併記
    const showSwain = isIII && item.label.includes("pCR") && item.pfs === 90;
    // 術前療法系の行を手術先行で選んでいる場合の参考注記
    const isNeoRow = item.label.includes("術前") || item.label.includes("pCR");
    const showSurgeryFirstNote = isSurgeryFirst && isNeoRow;
    return (
      <div key={(isAlt?"a":"m")+i} style={{
        background: isAlt ? "#fbf9f2" : "#fff",
        border: notIndicated ? "1.5px solid #e0a030" : item.type === "trial" ? "1.5px solid #bacede" : "1.5px dashed #ccd8e8",
        borderRadius:8, padding:"9px 12px",
        opacity: showSurgeryFirstNote ? 0.82 : 1,
      }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:5 }}>
          <div style={{ flex:1, paddingRight:10 }}>
            <span style={{ fontSize:12, color:"#222", fontWeight:600, lineHeight:1.5 }}>{item.label}</span>
            {notIndicated && (
              <span style={{ marginLeft:6, fontSize:10, background:"#e0820a", color:"#fff",
                borderRadius:3, padding:"1px 6px", fontWeight:800, verticalAlign:"middle" }}>本症例は適応外</span>
            )}
            {item.type === "trial" && (
              <span style={{ marginLeft:6, fontSize:10, background:"#2a6aaa", color:"#fff",
                borderRadius:3, padding:"1px 5px", fontWeight:700, verticalAlign:"middle" }}>RCT</span>
            )}
            {item.tp && (
              <span style={{ marginLeft:6, fontSize:10, background:"#eef2f8", color:"#40608a",
                border:"1px solid #cdd8e8", borderRadius:3, padding:"1px 5px", fontWeight:700, verticalAlign:"middle" }}>{item.tp}</span>
            )}
            {item.ref && (
              <span style={{ marginLeft:6, fontSize:10, background:"#fff3e0", color:"#9a5a00",
                border:"1px solid #f0d0a0", borderRadius:3, padding:"1px 5px", fontWeight:700, verticalAlign:"middle" }}>参考値</span>
            )}
            {isAlt && (
              <span style={{ marginLeft:6, fontSize:10, background:"#efe7d8", color:"#7a5a2a",
                border:"1px solid #ddc9a8", borderRadius:3, padding:"1px 5px", fontWeight:700, verticalAlign:"middle" }}>別枠</span>
            )}
          </div>
          <span style={{ fontSize:18, fontWeight:900, color:txtCol, minWidth:52, textAlign:"right", lineHeight:1 }}>
            {item.pfs}<span style={{ fontSize:11, fontWeight:600 }}>%</span>
          </span>
        </div>
        <div style={{ background:"#eaeff7", borderRadius:6, height:12, overflow:"hidden", marginBottom:4 }}>
          <div className="pfs-bar" style={{ "--bar-w": barW, height:"100%", borderRadius:6, width: barW, background: barGrad }} />
        </div>
        {notIndicated && (
          <div style={{ fontSize:11, color:"#7a4400", background:"#fff2d8", border:"1.5px solid #e0a030",
            borderRadius:5, padding:"5px 9px", marginBottom:4, lineHeight:1.6, fontWeight:600 }}>
            ⚠️ {notIndicated}<br />
            <span style={{ fontWeight:500, color:"#9a6a20" }}>（この値は monarchE 適格集団の報告値です。比較の参考として残しています）</span>
          </div>
        )}
        {showSwain && (
          <div style={{ fontSize:10, color:"#3a6a4a", background:"#eef7f0", border:"1px solid #cce4d4",
            borderRadius:5, padding:"4px 8px", marginBottom:4, lineHeight:1.6 }}>
            📎 <b>術前→術後レジメン別 内訳</b>（Swain 2022, Cancers 14:5051, 4y EFS・IPTW）：
            H→H（術前T単剤→術後T単剤）<b>86%</b> ／ PH→H（術前HP→術後T単剤）<b>90%</b>（当既定値）／ PH→PH（術前HP→術後HP継続）<b>95%</b>
            <br />※指標=4年EFS。他項のDFS/iDFS/無乳がん率とは直接比較不可。
          </div>
        )}
        {showSurgeryFirstNote && (
          <div style={{ fontSize:10, color:"#8a5a2a", background:"#fdf5e8", border:"1px solid #eddcc0",
            borderRadius:5, padding:"4px 8px", marginBottom:4, lineHeight:1.6 }}>
            ⚠️ 手術先行を選択中です。この行は術前療法（ネオアジュバント）を前提とした成績のため、参考としてご覧ください。
          </div>
        )}
        <div style={{ fontSize:10, color:"#8899bb", lineHeight:1.5 }}>出典：{item.source}</div>
      </div>
    );
  };

  return (
    <div style={{ marginTop:20 }}>
      {/* ヘッダー */}
      <div
        onClick={() => setExpanded(e => !e)}
        style={{
          display:"flex", alignItems:"center", justifyContent:"space-between",
          background:"linear-gradient(135deg,#1e3a5a,#2a5a8a)",
          borderRadius:expanded?"8px 8px 0 0":"8px",
          padding:"9px 14px", cursor:"pointer", userSelect:"none",
        }}
      >
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:13, fontWeight:800, color:"#fff", letterSpacing:"0.03em" }}>
            📊 治療別の予後（再発・死亡なく経過する割合）
          </span>
          <span style={{ fontSize:10, background:"rgba(255,255,255,0.18)", color:"#ddeeff",
            borderRadius:4, padding:"1px 6px", fontWeight:600 }}>
            Stage {anat} / {subtype}
          </span>
          {usePremeno && (
            <span style={{ fontSize:10, background:"rgba(255,205,130,0.30)", color:"#ffe4ad",
              borderRadius:4, padding:"1px 6px", fontWeight:700 }}>
              閉経前・OFS基盤
            </span>
          )}
        </div>
        <span style={{ fontSize:12, color:"#aaccee" }}>{expanded ? "▲ 閉じる" : "▼ 開く"}</span>
      </div>

      {expanded && (
        <div style={{
          border:"1.5px solid #d0dcee", borderTop:"none",
          borderRadius:"0 0 10px 10px", padding:"14px 16px", background:"#f8faff",
        }}>
          {/* 免責 */}
          <div style={{
            fontSize:10.5, color:"#6680aa", background:"#eef4ff",
            border:"1px solid #ccdaee", borderRadius:6, padding:"6px 10px",
            marginBottom:14, lineHeight:1.7,
          }}>
            ⚠️ <b>参考値</b>：主要RCT（以下に出典を記載）の報告値をベースにした推定値です。欧米試験データが中心のため日本人での値と乖離する可能性があります。
            個々の患者さんの状況・合併症・全身状態・PS等により大きく異なります。臨床判断の参考としてご使用ください。<br />
            📅 <b>指標と時点は各項の出典に明記</b>（iDFS／DFS／EFS等）。原則5年ですが、試験により3年・7年・8年の値を用いています。異なる時点・集団の数値どうしは直接比較できません。<br />
            📌 各値は試験・観察時点・指標（DFS／iDFS／EFS／無乳がん率）が項目により異なる場合があります。治療選択の目安であり、項目間の直接比較には各項の出典をご確認ください。
          </div>

          {menoUnset && (
            <div style={{
              fontSize:10.5, color:"#7a5a2a", background:"#fdf5e8",
              border:"1px solid #eddcc0", borderRadius:6, padding:"6px 10px",
              marginBottom:14, lineHeight:1.6,
            }}>
              ℹ️ 閉経状況が未選択のため、<b>閉経後データに準拠</b>して表示しています（閉経前を選ぶとOFS基盤の内分泌療法に切り替わります）。
            </div>
          )}

          {/* 凡例 */}
          <div style={{ display:"flex", gap:12, marginBottom:12, flexWrap:"wrap" }}>
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <div style={{ width:14, height:14, borderRadius:3, border:"2px solid #2a6aaa", background:"#eef4ff" }} />
              <span style={{ fontSize:11, color:"#555" }}>試験直接値（RCT報告）</span>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <div style={{ width:14, height:14, borderRadius:3, border:"2px dashed #aabbcc", background:"#f5f8ff" }} />
              <span style={{ fontSize:11, color:"#555" }}>推定値（メタ解析・SEER等より）</span>
            </div>
          </div>

          {/* バーチャート（主系列） */}
          <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
            {mainRows.map((item, i) => renderBar(item, i, false))}
          </div>

          {/* 別枠タグ（②単剤トラスツズマブ等・主系列と分離した臨床オプション） */}
          {altRows.length > 0 && (
            <div style={{ marginTop:14 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"#8a6a2a", marginBottom:7,
                display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ background:"#efe7d8", color:"#7a5a2a", border:"1px solid #ddc9a8",
                  borderRadius:3, padding:"1px 6px", fontSize:10 }}>別枠</span>
                参考オプション（主系列とは集団・時点が異なります）
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:11 }}>
                {altRows.map((item, i) => renderBar(item, i, true))}
              </div>
            </div>
          )}

          {/* カラーガイド */}
          <div style={{ marginTop:12, display:"flex", gap:8, flexWrap:"wrap" }}>
            {[
              { range:"≥88%", col:"#1a6a3a", grad:"#1a7a4a" },
              { range:"75〜87%", col:"#2a508a", grad:"#3060aa" },
              { range:"60〜74%", col:"#7a4a00", grad:"#8a5500" },
              { range:"<60%", col:"#882200", grad:"#992200" },
            ].map(({ range, col, grad }) => (
              <div key={range} style={{ display:"flex", alignItems:"center", gap:4 }}>
                <div style={{ width:12, height:12, borderRadius:3, background:grad }} />
                <span style={{ fontSize:10, color:col, fontWeight:600 }}>{range}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── UI Components ──────────────────────────────────────────────────────
function TnmBtn({ label, active, onToggle, disabled }) {
  return (
    <button onClick={onToggle} disabled={disabled} style={{
      padding:"8px 13px", borderRadius:8, minWidth:48, lineHeight:1,
      border:active?"2px solid #1a5fa8":"2px solid #d4dae4",
      background:active?"#1a5fa8":disabled?"#f5f5f5":"#fff",
      color:active?"#fff":disabled?"#ccc":"#333",
      fontSize:14, fontWeight:active?700:500,
      cursor:disabled?"not-allowed":"pointer", transition:"all 0.12s", opacity:disabled?0.5:1,
    }}>{label}</button>
  );
}

function SegBtn({ options, value, onChange, small }) {
  return (
    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
      {options.map(opt => {
        const v = typeof opt === "string" ? opt : opt.value;
        const l = typeof opt === "string" ? opt : opt.label;
        const active = value === v;
        return (
          <button key={v} onClick={()=>onChange(v===value?null:v)} style={{
            padding: small?"5px 10px":"7px 14px", borderRadius:8,
            border:active?"2px solid #1a5fa8":"2px solid #d4dae4",
            background:active?"#1a5fa8":"#fff", color:active?"#fff":"#333",
            fontSize:small?12:13, fontWeight:active?700:500,
            cursor:"pointer", transition:"all 0.12s",
          }}>{l}</button>
        );
      })}
    </div>
  );
}

function PlusMinus({ label, value, onChange }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:4 }}>
      <span style={{ fontSize:11, fontWeight:700, color:"#888", minWidth:32 }}>{label}</span>
      {["+","-"].map(v => (
        <button key={v} onClick={()=>onChange(v===value?null:v)} style={{
          width:32, height:28, borderRadius:6,
          border:value===v?"2px solid #1a5fa8":"2px solid #d4dae4",
          background:value===v?"#1a5fa8":"#fff", color:value===v?"#fff":"#555",
          fontSize:15, fontWeight:700, cursor:"pointer", lineHeight:1, transition:"all 0.12s",
        }}>{v}</button>
      ))}
    </div>
  );
}

const arrowBtn = { width:24, height:24, borderRadius:5, border:"1.5px solid #d4dae4", background:"#fff", fontSize:10, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0, color:"#555" };

function Ki67Slider({ value, onChange }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <span style={{ fontSize:11, fontWeight:700, color:"#888", minWidth:42 }}>Ki-67</span>
      <button onClick={()=>onChange(Math.max(0,value-1))} style={arrowBtn}>◀</button>
      <div style={{ position:"relative", flex:1 }}>
        <input type="range" min={0} max={100} value={value} onChange={e=>onChange(Number(e.target.value))} style={{ width:"100%", accentColor:"#1a5fa8", cursor:"pointer" }} />
        <div style={{ position:"absolute", top:-4, left:"20%", transform:"translateX(-50%)", width:2, height:8, background:"#e07030", borderRadius:1 }} />
      </div>
      <button onClick={()=>onChange(Math.min(100,value+1))} style={arrowBtn}>▶</button>
      <span style={{ fontSize:13, fontWeight:700, minWidth:40, textAlign:"right", color:value>=20?"#b03000":"#333" }}>{value}%</span>
    </div>
  );
}

function RowLabel({ children }) {
  return <div style={{ fontSize:11, fontWeight:700, color:"#999", letterSpacing:"0.1em", marginBottom:7 }}>{children}</div>;
}
function Divider({ title }) {

}

function TreatmentScheduleTable({ primaryTx, subtype, surgery, lymphNode, menopause, anat, n, t, grade, ki67 }) {
  const rows = buildSchedule(primaryTx, subtype, surgery, lymphNode, menopause, anat, n, t, grade, ki67);
  if (!rows.length) return null;
  const PHASE_COLOR = {
    "術前化学療法":"#1a5fa8","手術":"#b05a00","術後療法":"#1a7a4a",
    "術後化学療法":"#1a5fa8","術後抗HER2療法":"#1a7a4a",
    "内分泌療法":"#7a3a9a","術後内分泌療法":"#7a3a9a",
    "放射線療法":"#8a6a00","定期フォロー":"#555",
    "術前内分泌療法（追加時）":"#7a3a9a",
    "1次治療":"#1a5fa8","2次治療":"#334488","3次治療（参考）":"#553388",
    "化学療法（耐性後）":"#554400","定期評価":"#555","症状緩和ケア":"#2a7a3a",
  };
  let lastPhase = null;
  return (
    <div style={{ marginTop:20 }}>
      <div style={{ fontSize:13, fontWeight:700, color:"#fff", background:"#2c3e6a", borderRadius:6, padding:"5px 12px", marginBottom:10, display:"inline-block" }}>治療スケジュール（目安）</div>
      <div style={{ fontSize:11, color:"#888", marginBottom:8 }}>※個人差・病理結果・合併症により変更になる場合があります</div>
      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
        <thead>
          <tr style={{ background:"#f0f4fa" }}>
            <th style={{ padding:"7px 9px", textAlign:"left", fontWeight:700, color:"#334", borderBottom:"2px solid #1a5fa8", width:"28%" }}>フェーズ</th>
            <th style={{ padding:"7px 9px", textAlign:"left", fontWeight:700, color:"#334", borderBottom:"2px solid #1a5fa8", width:"24%" }}>時期</th>
            <th style={{ padding:"7px 9px", textAlign:"left", fontWeight:700, color:"#334", borderBottom:"2px solid #1a5fa8" }}>内容</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((row, i) => {
            const showPhase = row.phase !== lastPhase;
            lastPhase = row.phase;
            return (
              <tr key={i} style={{ background: row.color, borderBottom:"1px solid #e0e8f0" }}>
                <td style={{ padding:"7px 9px", verticalAlign:"top", fontWeight:700, color: PHASE_COLOR[row.phase] ?? "#333" }}>{showPhase ? row.phase : ""}</td>
                <td style={{ padding:"7px 9px", verticalAlign:"top", color:"#555", whiteSpace:"pre-line", fontSize:11 }}>{row.period}</td>
                <td style={{ padding:"7px 9px", verticalAlign:"top", color:"#222", whiteSpace:"pre-line", lineHeight:1.65 }}>{row.content}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────
function App() {
  const [patientName, setPatientName] = useState("");
  const [age, setAge] = useState("");
  const [menopause, setMenopause] = useState(null);
  const [surgery, setSurgery] = useState(null);
  const [primaryTx, setPrimaryTx] = useState(null);
  const [lymphNode, setLymphNode] = useState(null);
  const [selT, setSelT] = useState(null);
  const [selT4sub, setSelT4sub] = useState(null);
  const [selN, setSelN] = useState(null);
  const [selM, setSelM] = useState(null);
  const [tumorSize, setTumorSize] = useState(null);
  const [lymphCount, setLymphCount] = useState(null);
  const [er, setEr] = useState(null);
  const [pr, setPr] = useState(null);
  const [her2, setHer2] = useState(null);
  const [grade, setGrade] = useState(null);
  const [ki67, setKi67] = useState(20);
  const [oncotype, setOncotype] = useState(null);

  function tFromSize(mm) {
    if (mm === null) return null;
    if (mm === 0) return "T0";
    if (mm <= 20) return "T1";
    if (mm <= 50) return "T2";
    return "T3";
  }
  function nFromCount(n) {
    if (n === null) return null;
    if (n === 0) return "N0";
    if (n <= 3) return "N1";
    if (n <= 9) return "N2";
    return "N3";
  }

  // 【v2.1.15】単一ソース化：T/Nはそれぞれ「数値スライダー」と「フラグボタン」の2入力だが、
  //   活性値(activeT/activeN)は常にどちらか一方から一意に決まる（数値が入っていれば数値が上書き）。
  //   nCountは廃止（N1ボタン=1–3個と定義が確定・≥4はN2へ自動昇格）。
  const autoT = tFromSize(tumorSize);
  const autoN = nFromCount(lymphCount);
  const activeT = selT === "T4" ? "T4" : (tumorSize !== null ? autoT : selT);
  const activeN = lymphCount !== null ? autoN : selN;

  const anat      = getAnatomical(activeT, activeN, selM);
  const prog      = getPrognostic(anat, er, pr, her2, grade);
  const subtype   = getSubtype(er, pr, her2);
  const treatment = getTreatment(anat, subtype, ki67, activeN, activeT, grade, menopause, surgery, oncotype, primaryTx, lymphNode);

  const stageLabel = (anat && anat !== "invalid") ? `Stage ${anat}` : null;
  const stageColor = (anat && anat !== "invalid") ? (STAGE_COLOR[anat] || "#333") : "#ccc";
  const allTNM     = activeT && activeN && selM;
  const showProgNote  = allTNM && anat !== "invalid" && anat !== "0" && anat !== "IV" && prog && prog !== anat;
  const biomarkersComplete = anat === "0" ? true : (er !== null && her2 !== null && grade !== null);   // DCIS(0)はバイオマーカー入力の有無に関わらず治療方針以下を表示（v2.1.0）
  const showNeoAdj    = subtype === "TNBC" || subtype === "HER2+" || subtype === "HR+/HER2+";
  const showNeoAdjHR  = subtype === "HR+/HER2-" && ["T2","T3","T4"].includes(activeT);
  const isM1 = selM === "M1";

  useEffect(() => {
    if (isM1) { setSurgery("非手術（薬物療法）"); setLymphNode(null); setPrimaryTx(null); }
  }, [isM1]);

  function handleReset() {
    setPatientName(""); setAge(""); setMenopause(null); setSurgery(null);
    setPrimaryTx(null); setLymphNode(null);
    setSelT(null); setSelT4sub(null); setSelN(null); setSelM(null);
    setTumorSize(null); setLymphCount(null);
    setEr(null); setPr(null); setHer2(null); setGrade(null); setKi67(20);
    setOncotype(null);
  }

  // 【v2.1.15】単一ソース強制：数値スライダー/ステッパを触った瞬間、対応するフラグボタン選択を破棄する（同期上書き）。
  //   これで「ボタンで選んだ状態のまま裏でスライダーが別値を持つ」矛盾が構造的に起きない（Gemini指摘の非同期を解消）。
  const applyTumorSize = (updater) => { setTumorSize(updater); setSelT(null); setSelT4sub(null); };
  const applyLymphCount = (updater) => { setLymphCount(updater); setSelN(null); };

  const hasInput = activeT||activeN||selM||er||pr||her2||grade||patientName||age||menopause||surgery||primaryTx||lymphNode;
  const today = new Date().toLocaleDateString("ja-JP", { year:"numeric", month:"long", day:"numeric" });
  const showSchedule = treatment && biomarkersComplete && (primaryTx || surgery);
  // 5年PFSパネルはバイオマーカー確定後に表示
  const showPfs = biomarkersComplete && subtype && anat && anat !== "invalid" && anat !== "0" && anat !== "IV";

  return (
    <div style={{ minHeight:"100vh", display:"flex", justifyContent:"center", padding:"18px 12px 60px" }}>
      <div style={{ width:"100%", maxWidth:520 }} id="print-area">

        {/* Header */}
        <div style={{ textAlign:"center", marginBottom:14 }} className="no-print">
          <h1 style={{ fontSize:19, fontWeight:800, color:"#111" }}>乳がん TNM分類・治療方針</h1>
          <div style={{ fontSize:11, color:"#bbb", marginTop:3 }}>AJCC 8th / APIキー不要スタンドアローン版</div>
        </div>

        <div style={{ background:"#fff", borderRadius:14, boxShadow:"0 2px 12px rgba(0,0,0,0.08)", overflow:"hidden" }}>

          {/* Stage display */}
          <div style={{ minHeight:140, padding:"16px 20px 12px", borderBottom:"1px solid #eaeef3", display:"flex", flexDirection:"column", justifyContent:"space-between" }}>
            <div style={{ display:"flex", alignItems:"baseline", gap:10, flexWrap:"wrap" }}>
              <div style={{ fontSize:stageLabel?32:16, fontWeight:800, color:stageLabel?stageColor:"#ccc", lineHeight:1 }}>
                {anat==="invalid"?"—":stageLabel??"—"}
              </div>
              {anat==="invalid"&&allTNM&&<div style={{ fontSize:12, color:"#a04000" }}>AJCC 8版のステージ群に収載されていません</div>}
              {showProgNote&&<div style={{ fontSize:11, color:"#999" }}>予後予測Stage: <b style={{ color:STAGE_COLOR[prog]??"#555" }}>{prog}</b> — バイオマーカー補正後</div>}
              {allTNM&&anat!=="invalid"&&anat!=="0"&&anat!=="IV"&&!prog&&<div style={{ fontSize:11, color:"#bbb" }}>← バイオマーカーで補正可</div>}
              {subtype&&<span style={{ fontSize:11, background:"#f0f4fa", color:"#558", borderRadius:4, padding:"2px 7px", fontWeight:700 }}>{subtype}</span>}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:3, marginTop:8 }}>
              {[["T",activeT,T_DESC],["N",activeN,N_DESC],["M",selM,M_DESC]].map(([lbl,sel,desc])=>(
                <div key={lbl} style={{ fontSize:12, color:sel?"#444":"#ddd", lineHeight:1.4 }}>
                  <span style={{ fontWeight:700, marginRight:4, color:sel?"#888":"#ddd" }}>{lbl}：</span>
                  {lbl==="T" && sel==="T4" ? (selT4sub ? `${selT4sub}：${T4_SUB_DESC[selT4sub]}` : desc["T4"]) : sel ? desc[sel] : "—"}
                </div>
              ))}
            </div>
          </div>

          <div style={{ padding:"16px 20px", display:"flex", flexDirection:"column", gap:14 }}>

            {/* Patient info */}
            <Divider title="患者情報（任意）" />
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              <div style={{ flex:2, minWidth:140 }}>
                <RowLabel>患者氏名</RowLabel>
                <input type="text" value={patientName} onChange={e=>setPatientName(e.target.value)} placeholder="例：山田 花子"
                  style={{ width:"100%", padding:"7px 10px", borderRadius:7, border:"1.5px solid #d4dae4", fontSize:13, color:"#333" }} />
              </div>
              <div style={{ flex:1, minWidth:72 }}>
                <RowLabel>年齢</RowLabel>
                <input type="number" value={age} onChange={e=>setAge(e.target.value)} placeholder="例：52" min={0} max={120}
                  style={{ width:"100%", padding:"7px 10px", borderRadius:7, border:"1.5px solid #d4dae4", fontSize:13, color:"#333" }} />
              </div>
            </div>

            {/* TNM */}
            <Divider title="TNM 分類" />

            {/* T */}
            <div>
              <RowLabel>T — 原発腫瘍</RowLabel>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10, background:"#f8faff", borderRadius:8, padding:"8px 10px" }}>
                <span style={{ fontSize:11, fontWeight:700, color:"#888", minWidth:58 }}>浸潤径</span>
                <button onClick={()=>applyTumorSize(v => v===null?20:Math.max(1,v-1))} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:"#fff", cursor:"pointer", fontSize:12 }}>◀</button>
                <div style={{ position:"relative", flex:1 }}>
                  <input type="range" min={1} max={80} value={tumorSize ?? 20} disabled={tumorSize===null}
                    onChange={e=>applyTumorSize(Number(e.target.value))}
                    style={{ width:"100%", accentColor:"#1a5fa8", cursor:tumorSize===null?"not-allowed":"pointer", opacity:tumorSize===null?0.4:1 }} />
                  {[20,50].map(v=>(
                    <div key={v} style={{ position:"absolute", top:-4, left:`${((v-1)/79)*100}%`, transform:"translateX(-50%)", width:2, height:8, background:"#e07030", borderRadius:1 }} />
                  ))}
                </div>
                <button onClick={()=>applyTumorSize(v => v===null?20:Math.min(80,v+1))} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:"#fff", cursor:"pointer", fontSize:12 }}>▶</button>
                <span style={{ fontSize:13, fontWeight:700, minWidth:48, textAlign:"right", color:"#1a5fa8" }}>
                  {tumorSize===null ? "—" : `${tumorSize} mm`}
                </span>
                <button onClick={()=>setTumorSize(null)} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:tumorSize===null?"#f5f5f5":"#fff", color:tumorSize===null?"#ccc":"#888", cursor:tumorSize===null?"not-allowed":"pointer", fontSize:11 }}>クリア</button>
              </div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {T_ITEMS.map(t=>(
                  <TnmBtn key={t} label={t} active={activeT===t} onToggle={()=>{
                    // 統一ハンドラ：現在の活性値(activeT)基準でトグル。ボタンを押したら数値スライダーはクリア（同期上書き）。
                    const on = activeT===t;
                    setSelT(on ? null : t);
                    setTumorSize(null);
                    if (on || t !== "T4") setSelT4sub(null);   // T4以外を選ぶ/T4を外す→亜分類をクリア
                  }} />
                ))}
              </div>
              {activeT === "T4" && (
                <div style={{ marginTop:7, display:"flex", gap:5, flexWrap:"wrap" }}>
                  {["T4a","T4b","T4c","T4d"].map(sub=>(
                    <button key={sub} onClick={()=>setSelT4sub(selT4sub===sub?null:sub)} style={{
                      padding:"5px 10px", borderRadius:6, fontSize:12,
                      border:selT4sub===sub?"2px solid #b03000":"2px solid #f0d0c0",
                      background:selT4sub===sub?"#b03000":"#fff8f5", color:selT4sub===sub?"#fff":"#a03000", fontWeight:selT4sub===sub?700:500, cursor:"pointer",
                    }}>{sub}</button>
                  ))}
                </div>
              )}
              {activeT && activeT !== "T4" && (
                <div style={{ marginTop:5, fontSize:11, color:"#888" }}>→ {T_DESC[activeT]}</div>
              )}
            </div>

            {/* N */}
            <div>
              <RowLabel>N — リンパ節</RowLabel>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:10, background:"#f8faff", borderRadius:8, padding:"8px 10px" }}>
                <span style={{ fontSize:11, fontWeight:700, color:"#888", minWidth:58 }}>pN個数</span>
                <button onClick={()=>applyLymphCount(v => v===null?0:Math.max(0,v-1))} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:"#fff", cursor:"pointer", fontSize:12 }}>◀</button>
                <div style={{ position:"relative", flex:1 }}>
                  <input type="range" min={0} max={20} value={lymphCount ?? 0} disabled={lymphCount===null}
                    onChange={e=>applyLymphCount(Number(e.target.value))}
                    style={{ width:"100%", accentColor:"#1a5fa8", cursor:lymphCount===null?"not-allowed":"pointer", opacity:lymphCount===null?0.4:1 }} />
                  {[1,4,10].map(v=>(
                    <div key={v} style={{ position:"absolute", top:-4, left:`${(v/20)*100}%`, transform:"translateX(-50%)", width:2, height:8, background:"#e07030", borderRadius:1 }} />
                  ))}
                </div>
                <button onClick={()=>applyLymphCount(v => v===null?0:Math.min(20,v+1))} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:"#fff", cursor:"pointer", fontSize:12 }}>▶</button>
                <span style={{ fontSize:13, fontWeight:700, minWidth:36, textAlign:"right", color:"#1a5fa8" }}>
                  {lymphCount===null ? "—" : `${lymphCount}個`}
                </span>
                <button onClick={()=>setLymphCount(null)} style={{ padding:"2px 8px", borderRadius:6, border:"1px solid #d4dae4", background:lymphCount===null?"#f5f5f5":"#fff", color:lymphCount===null?"#ccc":"#888", cursor:lymphCount===null?"not-allowed":"pointer", fontSize:11 }}>クリア</button>
              </div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {N_ITEMS.map(n=>(
                  <TnmBtn key={n} label={n} active={activeN===n} onToggle={()=>{
                    // 統一ハンドラ：activeN基準でトグル。ボタンを押したら個数スライダーはクリア（同期上書き）。
                    const on = activeN===n;
                    setLymphCount(null);
                    setSelN(on ? null : n);
                  }} />
                ))}
              </div>
              {/* 【v2.1.15】N1個数(1-3/4+)セグメントは廃止。個数≥4はN2へ自動昇格するため
                  「N1かつ4個」が構造的に生成不能となり、旧セグメントは不要（③）。 */}
              {activeN && <div style={{ marginTop:5, fontSize:11, color:"#888" }}>→ {N_DESC[activeN]}</div>}
            </div>

            {/* M */}
            <div>
              <RowLabel>M — 遠隔転移</RowLabel>
              <div style={{ display:"flex", gap:5 }}>
                {M_ITEMS.map(m=>(
                  <TnmBtn key={m} label={m} active={selM===m} onToggle={()=>setSelM(selM===m?null:m)} />
                ))}
              </div>
              {selM && <div style={{ marginTop:5, fontSize:11, color:selM==="M1"?"#a02000":"#888" }}>→ {M_DESC[selM]}</div>}
            </div>

            {/* Biomarkers */}
            {allTNM && anat !== "invalid" && (
              <>
                <Divider title="バイオマーカー" />
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  <PlusMinus label="ER" value={er} onChange={setEr} />
                  <PlusMinus label="PgR" value={pr} onChange={setPr} />
                  <PlusMinus label="HER2" value={her2} onChange={setHer2} />
                </div>
                <div>
                  <RowLabel>Grade（核グレード）</RowLabel>
                  <SegBtn options={["1","2","3","未施行"]} value={grade} onChange={setGrade} small />
                </div>
                <Ki67Slider value={ki67} onChange={setKi67} />
              </>
            )}

            {/* Oncotype DX */}
            {biomarkersComplete && isOncotypeDxEligible(subtype, activeN, grade, ki67) && !isM1 && (
              <div>
                <RowLabel>Oncotype DX（術前は医療保険未承認）</RowLabel>
                <SegBtn options={["低リスク","中リスク","高リスク","未施行"]} value={oncotype} onChange={setOncotype} small />
              </div>
            )}

            {/* Menopause */}
            {biomarkersComplete && (
              <div>
                <RowLabel>閉経状況</RowLabel>
                <SegBtn options={["閉経前","閉経後"]} value={menopause} onChange={setMenopause} />
              </div>
            )}

            {/* Primary treatment */}
            {biomarkersComplete && !isM1 && (
              <div>
                <RowLabel>初回治療方針</RowLabel>
                <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                  <button onClick={()=>setPrimaryTx(primaryTx==="手術"?null:"手術")} style={{
                    padding:"8px 18px", borderRadius:8,
                    border:primaryTx==="手術"?"2px solid #1a5fa8":"2px solid #d4dae4",
                    background:primaryTx==="手術"?"#1a5fa8":"#fff", color:primaryTx==="手術"?"#fff":"#444",
                    fontSize:13, fontWeight:primaryTx==="手術"?700:500, cursor:"pointer",
                  }}>手術（先行）</button>
                  {showNeoAdj && (
                    <button onClick={()=>setPrimaryTx(primaryTx==="術前化学療法"?null:"術前化学療法")} style={{
                      padding:"8px 18px", borderRadius:8,
                      border:primaryTx==="術前化学療法"?"2px solid #b03000":"2px solid #d4dae4",
                      background:primaryTx==="術前化学療法"?"#b03000":"#fff",
                      color:primaryTx==="術前化学療法"?"#fff":"#b03000",
                      fontSize:13, fontWeight:primaryTx==="術前化学療法"?700:500, cursor:"pointer",
                    }}>術前化学療法（ネオアジュバント）</button>
                  )}
                  {showNeoAdjHR && (
                    <button onClick={()=>setPrimaryTx(primaryTx==="術前化学内分泌療法"?null:"術前化学内分泌療法")} style={{
                      padding:"8px 18px", borderRadius:8,
                      border:primaryTx==="術前化学内分泌療法"?"2px solid #6a1a8a":"2px solid #d4dae4",
                      background:primaryTx==="術前化学内分泌療法"?"#6a1a8a":"#fff",
                      color:primaryTx==="術前化学内分泌療法"?"#fff":"#6a1a8a",
                      fontSize:13, fontWeight:primaryTx==="術前化学内分泌療法"?700:500, cursor:"pointer",
                    }}>術前化学療法（HR+/HER2-）</button>
                  )}
                </div>
              </div>
            )}

            {/* Surgery */}
            {biomarkersComplete && (
              <div>
                <RowLabel>乳房手術術式</RowLabel>
                {/* 【v2.1.4】M1: 従来は「非手術」固定表示だったが、遠隔転移例でも局所制御・症状緩和目的の手術はありうる（IwaoK）。
                    選択可能にしつつ、スケジュールは buildSchedule の isPalliative で常に緩和的1次治療枝に固定される。
                    M0: 高齢・寝たきり・皮膚浸潤等で非切除とする例があるため「非手術（薬物療法）」を追加（IwaoK）。 */}
                <SegBtn options={isM1 ? ["非手術（薬物療法）","温存","全摘"] : ["温存","全摘","非手術（薬物療法）","未決定"]} value={surgery} onChange={setSurgery} />
                {isM1 && surgery && surgery !== "非手術（薬物療法）" && (
                  <div style={{ marginTop:6, padding:"7px 10px", background:"#fff4e5", border:"1px solid #f0c891", borderRadius:6, fontSize:12, color:"#7a4a00", lineHeight:1.6 }}>
                    遠隔転移がある場合の手術は、局所の症状をやわらげる・局所を抑える目的で行います。再発予防のための「術後の追加治療」は行わず、全身の薬物療法（緩和的1次治療）が治療の中心になります。
                  </div>
                )}
                {!isM1 && surgery === "非手術（薬物療法）" && (
                  <div style={{ marginTop:6, padding:"7px 10px", background:"#f0f8f0", border:"1px solid #b8d8b8", borderRadius:6, fontSize:12, color:"#2a5a2a", lineHeight:1.6 }}>
                    手術を行わない場合は、薬物療法と症状緩和ケア（痛み・皮膚の症状など）が治療の中心になります。
                  </div>
                )}
              </div>
            )}

            {/* Lymph node */}
            {biomarkersComplete && !isM1 && (
              <div>
                <RowLabel>リンパ節処理</RowLabel>
                <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                  {[
                    { label:"センチネルリンパ節生検", val:"センチネル生検", color:"#1a5fa8" },
                    { label:"腋窩リンパ節郭清", val:"腋窩郭清", color:"#883000" },
                    { label:"生検＋郭清（両方）", val:"両方", color:"#6a006a" },
                    ...(anat === "0" ? [{ label:"施行しない", val:"なし", color:"#5a6a7a" }] : []),
                  ].map(({ label, val, color }) => (
                    <button key={val} onClick={()=>setLymphNode(lymphNode===val?null:val)} style={{
                      padding:"7px 14px", borderRadius:8,
                      border:lymphNode===val?`2px solid ${color}`:"2px solid #d4dae4",
                      background:lymphNode===val?color:"#fff", color:lymphNode===val?"#fff":"#555",
                      fontSize:12, fontWeight:lymphNode===val?700:500, cursor:"pointer", whiteSpace:"nowrap",
                    }}>{label}</button>
                  ))}
                </div>
                {lymphNode && (
                  <div style={{ marginTop:7, fontSize:11, lineHeight:1.75, padding:"8px 12px", borderRadius:7,
                    background: lymphNode==="センチネル生検"?"#f4f8ff": lymphNode==="腋窩郭清"?"#fff5f0": lymphNode==="なし"?"#f4f6f8":"#f8f0ff",
                    border: lymphNode==="センチネル生検"?"1px solid #d0e4f8": lymphNode==="腋窩郭清"?"1px solid #f0c8b0": lymphNode==="なし"?"1px solid #d8dee4":"1px solid #e0c0f0",
                    color: lymphNode==="センチネル生検"?"#334488": lymphNode==="腋窩郭清"?"#883000": lymphNode==="なし"?"#44515e":"#552266",
                  }}>
                    {lymphNode === "センチネル生検" && "腋窩に最初に流れる「見張りリンパ節」を手術中に取り出して調べます。転移がなければ郭清は省略できます（リンパ浮腫リスク約5%）。"}
                    {lymphNode === "腋窩郭清" && "腋窩のリンパ節を広範囲に取り除きます。リンパ浮腫（腕のむくみ）のリスクがあります（15〜25%）。術後リハビリテーションが重要です。"}
                    {lymphNode === "両方" && "センチネルリンパ節生検を行い、術中迅速病理で転移が確認された場合に続けて腋窩リンパ節郭清を行います。"}
                    {lymphNode === "なし" && "リンパ節の手術（センチネルリンパ節生検）は行いません。非浸潤癌（DCIS）で乳房温存の場合、リンパ節転移の可能性が低いため省略できます（全摘や広範囲のDCISでは実施を検討します）。"}
                  </div>
                )}
              </div>
            )}

            {hasInput && (
              <div style={{ textAlign:"right" }}>
                <button onClick={handleReset} className="no-print" style={{ padding:"5px 16px", borderRadius:20, border:"1px solid #d0d0d0", background:"#fff", color:"#999", fontSize:12, cursor:"pointer" }}>リセット</button>
              </div>
            )}

            {/* Treatment direction */}
            {treatment && biomarkersComplete && (
              <>
                <Divider title="治療の方向性（参考）" />
                <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
                  {treatment.map((sec,i)=>(
                    <div key={i} style={{ background:"#f8faff", borderRadius:8, padding:"10px 12px", border:"1px solid #e8eef8" }}>
                      <div style={{ fontSize:11, fontWeight:700, color:"#334", marginBottom:6 }}>{sec.cat}</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                        {sec.items.map((item,j)=>(
                          <div key={j} style={{ display:"flex", gap:6, alignItems:"flex-start" }}>
                            <span style={{ color:"#1a5fa8", fontSize:11, marginTop:2, flexShrink:0 }}>▸</span>
                            <span style={{ fontSize:12, color:"#333", lineHeight:1.7, whiteSpace:"pre-line" }}>{item}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize:10, color:"#bbb", borderTop:"1px solid #f0f0f0", paddingTop:8, lineHeight:1.8 }}>
                  治療方針の最終決定は腫瘍内科・集学的カンファレンスでの判断を優先してください。
                </div>
              </>
            )}

            {/* ── 5年PFSパネル ── */}
            {showPfs && (
              <>
                <Divider title="治療別の予後（時点は各項に明記）" />
                <PfsPanel
                  anat={anat} subtype={subtype} menopause={menopause}
                  primaryTx={primaryTx} surgery={surgery}
                  n={activeN} t={activeT} grade={grade} ki67={ki67}
                />
              </>
            )}

            {/* Treatment schedule */}
            {showSchedule && (
              <TreatmentScheduleTable
                primaryTx={primaryTx} subtype={subtype}
                surgery={surgery} lymphNode={lymphNode} menopause={menopause}
                anat={anat} n={activeN} t={activeT} grade={grade} ki67={ki67}
              />
            )}

            {/* Print button */}
            {treatment && biomarkersComplete && (
              <button
                className="no-print"
                onClick={()=>window.print()}
                style={{
                  marginTop:8, padding:"12px", borderRadius:10, border:"none",
                  background:"linear-gradient(135deg, #2a7a4a 0%, #3a9a5a 100%)",
                  color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                  boxShadow:"0 3px 10px rgba(42,122,74,0.3)",
                }}>
                🖨️ 印刷 / PDF で保存
              </button>
            )}

          </div>
        </div>

        <div style={{ marginTop:10, fontSize:10, color:"#bbb", textAlign:"center", lineHeight:1.8 }} className="no-print">
          解剖学的ステージ ＋ Prognostic Stage（AJCC 8th）<br/>
          Oncotype DX 等ゲノム検査による補正は含みません。
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
/* PWA: Service Worker登録（Reactの初期化は上記babelブロックで完了済み・削除しないこと） */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js')
      .catch(function (e) { console.log('SW registration failed:', e); });
  });
}
</script>
</body>
</html>
